name: Notify on Tina edit

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual test fire"
        required: false
        default: "manual smoke test"

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    # Fire when:
    #  - the push was authored by Tina's GitHub App (real CMS edits), OR
    #  - the workflow was dispatched manually (for testing).
    # Gate by the GitHub App's stable user ID (58178390), since Tina has
    # renamed the bot from `tina-cloud-app` → `tinacloud-app` while keeping
    # the same account.
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.author.email, '58178390+')
    steps:
      - name: Build message
        id: msg
        env:
          IS_MANUAL: ${{ github.event_name == 'workflow_dispatch' }}
          REASON: ${{ github.event.inputs.reason }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          COMMIT_SHA: ${{ github.event.head_commit.id }}
          ADDED: ${{ toJson(github.event.head_commit.added) }}
          MODIFIED: ${{ toJson(github.event.head_commit.modified) }}
          REMOVED: ${{ toJson(github.event.head_commit.removed) }}
        run: |
          set -euo pipefail
          if [ "$IS_MANUAL" = "true" ]; then
            TITLE="Blue Studio: Tina edit (test)"
            MSG="Manual dispatch — $REASON"
            URL="https://bluestudio.space"
          else
            SHORT_SHA="${COMMIT_SHA:0:7}"
            # Summarize changed files (cap to 8 lines so push notifs stay readable).
            FILES=$(jq -rn \
              --argjson a "$ADDED" \
              --argjson m "$MODIFIED" \
              --argjson r "$REMOVED" \
              '($a | map("+ " + .)) + ($m | map("~ " + .)) + ($r | map("- " + .)) | .[]' \
              | head -8)
            EXTRA=$(jq -rn \
              --argjson a "$ADDED" \
              --argjson m "$MODIFIED" \
              --argjson r "$REMOVED" \
              '($a + $m + $r) | length')
            if [ "$EXTRA" -gt 8 ]; then
              FILES="${FILES}
…and $((EXTRA - 8)) more"
            fi
            TITLE="Blue Studio: Tina edit"
            MSG="${COMMIT_MSG}
${SHORT_SHA}
${FILES}"
            URL="$COMMIT_URL"
          fi
          {
            echo "title<<EOF"
            echo "$TITLE"
            echo "EOF"
            echo "message<<EOF"
            echo "$MSG"
            echo "EOF"
            echo "url=$URL"
          } >> "$GITHUB_OUTPUT"

      - name: Send Pushover notification
        env:
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          TITLE: ${{ steps.msg.outputs.title }}
          MESSAGE: ${{ steps.msg.outputs.message }}
          URL: ${{ steps.msg.outputs.url }}
        run: |
          set -euo pipefail
          HTTP_STATUS=$(curl -s -o /tmp/pushover.out -w "%{http_code}" \
            --form-string "token=$PUSHOVER_TOKEN" \
            --form-string "user=$PUSHOVER_USER" \
            --form-string "title=$TITLE" \
            --form-string "message=$MESSAGE" \
            --form-string "url=$URL" \
            --form-string "url_title=Open" \
            --form-string "priority=0" \
            https://api.pushover.net/1/messages.json)
          echo "Pushover HTTP $HTTP_STATUS"
          cat /tmp/pushover.out
          echo
          [ "$HTTP_STATUS" = "200" ]
