name: Build & deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm install --frozen-lockfile --prefer-offline

      # Cache Tina's compiled admin SPA + generated client/types, keyed on
      # everything that influences them (config + content schema + tina deps).
      # Content-only edits don't change this hash → cache hit → skip the 30s
      # tinacms build entirely.
      - name: Cache Tina admin SPA
        id: tina-cache
        uses: actions/cache@v4
        with:
          path: |
            public/admin
            tina/__generated__
            tina/tina-lock.json
          key: tina-admin-${{ runner.os }}-${{ hashFiles('tina/config.ts', 'src/content/config.ts', 'pnpm-lock.yaml') }}

      - name: Build Tina admin (only if cache miss)
        if: steps.tina-cache.outputs.cache-hit != 'true'
        env:
          TINA_PUBLIC_CLIENT_ID: ${{ secrets.TINA_PUBLIC_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
        run: pnpm tinacms build --skip-cloud-checks

      - name: Build Astro
        env:
          TINA_PUBLIC_CLIENT_ID: ${{ secrets.TINA_PUBLIC_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
          PUBLIC_FORMSPREE_ENDPOINT: ${{ secrets.PUBLIC_FORMSPREE_ENDPOINT }}
          PUBLIC_SITE_URL: https://bluestudio.space
        run: pnpm astro build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=blue-studio --branch=main --commit-dirty=true
